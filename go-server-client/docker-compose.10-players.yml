version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080" # Porta TCP
      - "8081:8081/udp" # Porta UDP
    networks:
      - app-network
    restart: unless-stopped

  player1:
    build:
      context: .
      dockerfile: Dockerfile.client
    depends_on:
      - server
    command: ["./client", "-bot", "Jogador1", "server"]
    networks:
      - app-network
    stdin_open: true 
    tty: true
    restart: on-failure

